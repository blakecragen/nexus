[project]
name = "nexus-agent"
version = "0.1.0"
description = "Nexus compute node agent"
requires-python = ">=3.11"
dependencies = [
    "nexus-common",
    "nexus-steps",
    "websockets>=13.0",
    "httpx>=0.27.0",
    "psutil>=6.0.0",
]

[project.scripts]
nexus-agent = "nexus_agent.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_agent"]
