[project]
name = "nexus-cli"
version = "0.1.0"
description = "Nexus CLI client"
requires-python = ">=3.11"
dependencies = [
    "nexus-common",
    "typer>=0.12.0",
    "httpx>=0.27.0",
    "rich>=13.0.0",
]

[project.scripts]
nexus = "nexus_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_cli"]
