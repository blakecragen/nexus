[project]
name = "nexus-common"
version = "0.1.0"
description = "Shared types, step base classes, and protocol definitions for Nexus"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_common"]
