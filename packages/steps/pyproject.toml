[project]
name = "nexus-steps"
version = "0.1.0"
description = "Built-in step implementations for Nexus"
requires-python = ">=3.11"
dependencies = [
    "nexus-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_steps"]
